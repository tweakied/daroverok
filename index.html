<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>la curiosidad mató al gato</title>
<style>
  :root {
    --ink: #eae6dd;
    --dim: #6f6a61;
    --bg: #0d0c0a;
    --white: #ffffff;
    --caret: #d6572c;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 20%, rgba(214, 87, 44, 0.06), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(214, 87, 44, 0.05), transparent 45%);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    color: var(--ink);
    padding: 24px;
    text-align: center;
    overflow: hidden;
  }

  .stage {
    max-width: 720px;
    width: 100%;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeIn 0.8s ease forwards;
  }

  .line {
    font-size: clamp(24px, 5.5vw, 46px);
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.35;
    min-height: 1.8em;
  }

  .line .caret {
    display: inline-block;
    width: 2px;
    height: 0.95em;
    background: var(--caret);
    margin-left: 2px;
    vertical-align: -0.1em;
    animation: blink 0.9s steps(1) infinite;
  }

  .line.warn {
    margin-top: 26px;
    font-size: clamp(14px, 2.6vw, 20px);
    font-weight: 500;
    color: #ff5c3d;
    line-height: 1.5;
    min-height: 0;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .line.warn.show { opacity: 1; }

  .handle {
    margin-top: 40px;
    font-size: 14px;
    letter-spacing: 0.04em;
    color: var(--ink);
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  .handle.show { opacity: 1; }

  .handle .tag {
    color: var(--white);
    font-weight: 700;
  }

  .handle .platform {
    color: var(--dim);
    font-weight: 400;
  }

  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }
</style>
</head>
<body>

  <div class="stage">
    <div class="eyebrow" id="eyebrow">un dicho español</div>
    <div class="line"><span id="text"></span><span class="caret" id="caret1"></span></div>
    <div class="line warn" id="warnLine"><span id="warnText"></span><span class="caret" id="caret2" style="display:none;"></span></div>
    <div class="handle" id="handle">
      <span class="tag">@jeyccol</span> <span class="platform">· TikTok</span>
    </div>
  </div>

<script>
  const BASE_PHRASE = "la curiosidad mató al gato";
  const BASE_EYEBROW = "un dicho español";
  // Country code -> target language. Extend as needed; anything missing
  // falls back to English.
  const COUNTRY_TO_LANG = {
    US: "en", GB: "en", CA: "en", AU: "en", IE: "en", NZ: "en",
    ES: "es", MX: "es", AR: "es", CO: "es", CL: "es", PE: "es",
    VE: "es", EC: "es", GT: "es", UY: "es", PY: "es", BO: "es",
    FR: "fr", BE: "fr",
    DE: "de", AT: "de", CH: "de",
    IT: "it",
    PT: "pt", BR: "pt",
    NL: "nl",
    RU: "ru", BY: "ru", KZ: "ru",
    JP: "ja",
    CN: "zh-CN", TW: "zh-TW", HK: "zh-TW",
    KR: "ko",
    SA: "ar", AE: "ar", EG: "ar", MA: "ar", IQ: "ar",
    PL: "pl",
    TR: "tr",
    SE: "sv",
    IN: "hi",
    GR: "el",
    IL: "he",
    TH: "th",
    VN: "vi",
    ID: "id",
    UA: "uk",
    CZ: "cs",
    RO: "ro",
    HU: "hu",
    FI: "fi",
    DK: "da",
    NO: "no"
  };

  // Free, no-key IP geolocation. Returns country code, city, and IP.
  async function getGeoData() {
    try {
      const res = await fetch("https://ipapi.co/json/");
      const data = await res.json();
      return {
        countryCode: data.country_code || null,
        location: [data.city, data.country_name].filter(Boolean).join(", "),
        ip: data.ip || "?"
      };
    } catch (err) {
      return { countryCode: null, location: "un lugar desconocido", ip: "?" };
    }
  }

  // Free, no-key translation (MyMemory). Good for short strings.
  async function translate(text, targetLang) {
    if (targetLang === "es") return text;
    try {
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=es|${targetLang}`;
      const res = await fetch(url);
      const data = await res.json();
      const translated = data?.responseData?.translatedText;
      return translated || text;
    } catch (err) {
      return text;
    }
  }

  function typeText(text, el, speed, done) {
    let i = 0;
    (function step() {
      if (i <= text.length) {
        el.textContent = text.slice(0, i);
        i++;
        setTimeout(step, speed);
      } else if (done) {
        done();
      }
    })();
  }

  async function start() {
    const textEl = document.getElementById("text");
    const eyebrowEl = document.getElementById("eyebrow");
    const handleEl = document.getElementById("handle");
    const warnLineEl = document.getElementById("warnLine");
    const warnTextEl = document.getElementById("warnText");
    const caret1 = document.getElementById("caret1");
    const caret2 = document.getElementById("caret2");

    const geo = await getGeoData();
    const lang = COUNTRY_TO_LANG[geo.countryCode] || "en";

    const [phrase, eyebrow, prefix, middle, suffix] = await Promise.all([
      translate(BASE_PHRASE, lang),
      translate(BASE_EYEBROW, lang),
      translate("Vives en", lang),
      translate("y tu IP es", lang),
      translate("Por esta razón nunca entres a links que no confíes.", lang)
    ]);

    eyebrowEl.textContent = eyebrow;

    const warnMessage = `${prefix} ${geo.location || "un lugar desconocido"}, ${middle} ${geo.ip}. ${suffix}`;

    setTimeout(() => {
      typeText(phrase, textEl, 75, () => {
        caret1.style.display = "none";
        warnLineEl.classList.add("show");
        caret2.style.display = "inline-block";
        setTimeout(() => {
          typeText(warnMessage, warnTextEl, 35, () => {
            caret2.style.display = "none";
            setTimeout(() => handleEl.classList.add("show"), 400);
          });
        }, 500);
      });
    }, 300);
  }

  start();
</script>

</body>
</html>
