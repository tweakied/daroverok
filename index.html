<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You found me</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #080810;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      overflow: hidden;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }
    .orb1 { width: 600px; height: 600px; background: rgba(99,102,241,0.14); top: -200px; left: -150px; }
    .orb2 { width: 400px; height: 400px; background: rgba(139,92,246,0.09); bottom: -150px; right: -100px; }
    .orb3 { width: 300px; height: 300px; background: rgba(59,130,246,0.07); top: 50%; left: 50%; transform: translate(-50%,-50%); }

    .card {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 64px 48px;
      max-width: 580px;
      width: 92%;
      animation: fadein 0.7s ease both;
    }

    .eyebrow {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .number-row {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 2px;
      margin-bottom: 2px;
    }

    .number {
      font-size: 100px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -6px;
      background: linear-gradient(140deg, #e0e7ff 0%, #a5b4fc 45%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .ordinal {
      font-size: 30px;
      font-weight: 600;
      color: rgba(165,180,252,0.6);
      letter-spacing: -1px;
      margin-top: 22px;
      margin-left: 2px;
    }

    .tagline {
      font-size: 26px;
      font-weight: 500;
      color: rgba(255,255,255,0.82);
      letter-spacing: -0.4px;
      line-height: 1.4;
      margin-bottom: 36px;
    }

    .divider {
      width: 36px;
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 0 auto 32px;
    }

    .from-label {
      font-size: 13px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.04em;
      margin-bottom: 14px;
    }

    .platform-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.06);
      border: 0.5px solid rgba(255,255,255,0.11);
      border-radius: 18px;
      padding: 13px 24px;
      font-size: 17px;
      font-weight: 600;
      color: rgba(255,255,255,0.88);
      letter-spacing: -0.2px;
      transition: background 0.3s, border-color 0.3s;
    }

    .platform-badge svg { width: 22px; height: 22px; flex-shrink: 0; }

    .bump { animation: bump 0.5s cubic-bezier(0.34,1.56,0.64,1); }

    @keyframes bump {
      0%   { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="card">
    <p class="eyebrow">congrats, you are the</p>

    <div class="number-row">
      <span class="number" id="count">—</span>
      <span class="ordinal" id="ordinal"></span>
    </div>

    <p class="tagline">person to visit my website<br>by curiosity</p>

    <div class="divider"></div>

    <p class="from-label">you opened this from</p>

    <div class="platform-badge" id="platform-badge">
      <span id="platform-icon"></span>
      <span id="platform-name">somewhere</span>
    </div>
  </div>

  <script>
    /* ── CountAPI for persistent real visitor count ── */
    const NAMESPACE = 'my-visitor-site-xk29a';
    const KEY = 'hits';

    async function getCount() {
      try {
        const res = await fetch(`https://api.countapi.xyz/hit/${NAMESPACE}/${KEY}`);
        const data = await res.json();
        return data.value || 1;
      } catch {
        const n = (parseInt(localStorage.getItem('vc') || '0')) + 1;
        localStorage.setItem('vc', String(n));
        return n;
      }
    }

    function getOrdinal(n) {
      const s = ['th','st','nd','rd'], v = n % 100;
      return s[(v - 20) % 10] || s[v] || s[0];
    }

    function animateCount(el, target) {
      const from = Math.max(target - Math.min(target - 1, 40), 0);
      const dur = 900, t0 = performance.now();
      const tick = now => {
        const p = Math.min((now - t0) / dur, 1);
        const ease = 1 - Math.pow(1 - p, 3);
        const val = Math.round(from + (target - from) * ease);
        el.textContent = val.toLocaleString();
        document.getElementById('ordinal').textContent = getOrdinal(val);
        if (p < 1) {
          requestAnimationFrame(tick);
        } else {
          el.textContent = target.toLocaleString();
          document.getElementById('ordinal').textContent = getOrdinal(target);
          el.classList.remove('bump');
          void el.offsetWidth;
          el.classList.add('bump');
        }
      };
      requestAnimationFrame(tick);
    }

    function detectPlatform() {
      const params = new URLSearchParams(location.search);
      const ref = (params.get('ref') || params.get('from') || '').toLowerCase();
      const referrer = (document.referrer || '').toLowerCase();

      const isDiscord  = ref === 'discord'  || referrer.includes('discord');
      const isTikTok   = ref === 'tiktok'   || referrer.includes('tiktok');
      const isTelegram = ref === 'telegram' || referrer.includes('t.me') || referrer.includes('telegram');

      const iconEl = document.getElementById('platform-icon');
      const nameEl = document.getElementById('platform-name');
      const badge  = document.getElementById('platform-badge');

      if (isDiscord) {
        nameEl.textContent = 'Discord';
        badge.style.borderColor = 'rgba(88,101,242,0.45)';
        badge.style.background  = 'rgba(88,101,242,0.12)';
        iconEl.innerHTML = `<svg viewBox="0 0 24 24" fill="none"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z" fill="#5865F2"/></svg>`;

      } else if (isTikTok) {
        nameEl.textContent = 'TikTok';
        iconEl.innerHTML = `<svg viewBox="0 0 24 24" fill="none"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V9.16a8.28 8.28 0 0 0 4.84 1.55V7.25a4.85 4.85 0 0 1-1.07-.56z" fill="white"/></svg>`;

      } else if (isTelegram) {
        nameEl.textContent = 'Telegram';
        badge.style.borderColor = 'rgba(38,165,228,0.4)';
        badge.style.background  = 'rgba(38,165,228,0.1)';
        iconEl.innerHTML = `<svg viewBox="0 0 24 24" fill="none"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z" fill="#26A5E4"/></svg>`;

      } else {
        badge.style.opacity = '0.4';
      }
    }

    (async () => {
      detectPlatform();
      const n = await getCount();
      animateCount(document.getElementById('count'), n);
    })();
  </script>

</body>
</html>
