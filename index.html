<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>la curiosidad mató al gato</title>
<style>
  @font-face {
    font-family: 'JetBrains Mono';
    src: local('JetBrains Mono');
  }

  :root {
    --ink: #eae6dd;
    --dim: #6f6a61;
    --bg: #0d0c0a;
    --accent: #ffffff;
    --caret: #d6572c;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 20%, rgba(214, 87, 44, 0.06), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(214, 87, 44, 0.05), transparent 45%);
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    color: var(--ink);
    padding: 24px;
    text-align: center;
    overflow: hidden;
  }

  .stage {
    max-width: 720px;
    width: 100%;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeIn 0.8s ease forwards;
  }

  .line {
    font-size: clamp(24px, 5.5vw, 46px);
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.35;
    min-height: 1.8em;
  }

  .line .caret {
    display: inline-block;
    width: 2px;
    height: 0.95em;
    background: var(--caret);
    margin-left: 2px;
    vertical-align: -0.1em;
    animation: blink 0.9s steps(1) infinite;
  }

  .translation {
    margin-top: 22px;
    font-size: clamp(13px, 2vw, 16px);
    color: var(--dim);
    font-style: italic;
    min-height: 1.6em;
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  .translation.show { opacity: 1; }

  .divider {
    width: 44px;
    height: 1px;
    background: #ffffff;
    margin: 40px auto;
    opacity: 0;
    transition: opacity 0.6s ease, width 0.6s ease;
  }

  .divider.show { opacity: 0.5; width: 88px; }

  .handle {
    font-size: 14px;
    letter-spacing: 0.04em;
    color: var(--ink);
    opacity: 0;
    transition: opacity 0.6s ease;
  }

  .handle.show { opacity: 1; }

  .handle .tag {
    color: var(--accent);
    font-weight: 700;
  }

  .handle .platform {
    color: var(--dim);
    font-weight: 400;
  }

  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }
</style>
</head>
<body>

  <div class="stage">
    <div class="eyebrow">un dicho español</div>
    <div class="line" id="line"><span id="text"></span><span class="caret"></span></div>
    <div class="translation" id="translation"></div>
    <div class="divider" id="divider"></div>
    <div class="handle" id="handle">
      <span class="tag">@jeyccol</span> <span class="platform">· TikTok</span>
    </div>
  </div>

<script>
  const phrase = "la curiosidad mató al gato";

  // Translations keyed by 2-letter language code (falls back to English)
  const translations = {
    en: "curiosity killed the cat",
    es: "la curiosidad mató al gato",
    fr: "la curiosité est un vilain défaut",
    de: "Neugier ist der Katze Tod",
    it: "la curiosità è il vizio dei gatti",
    pt: "a curiosidade matou o gato",
    nl: "nieuwsgierigheid is de dood van de kat",
    ru: "любопытной варваре на базаре нос оторвали",
    ja: "好奇心は猫を殺す",
    zh: "好奇害死猫",
    ko: "호기심이 고양이를 죽인다",
    ar: "الفضول قتل القط",
    pl: "ciekawość to pierwszy stopień do piekła",
    tr: "merak kediyi öldürür",
    sv: "nyfikenhet är inte alltid av godo",
    hi: "जिज्ञासा ने बिल्ली को मार डाला"
  };

  function getUserLangCode() {
    const lang = (navigator.language || navigator.userLanguage || "en").toLowerCase();
    return lang.split("-")[0];
  }

  function typeText(text, el, speed, done) {
    let i = 0;
    (function step() {
      if (i <= text.length) {
        el.textContent = text.slice(0, i);
        i++;
        setTimeout(step, speed);
      } else if (done) {
        done();
      }
    })();
  }

  function start() {
    const textEl = document.getElementById("text");
    const translationEl = document.getElementById("translation");
    const dividerEl = document.getElementById("divider");
    const handleEl = document.getElementById("handle");

    const langCode = getUserLangCode();
    const translated = translations[langCode] || translations.en;
    const showTranslation = langCode !== "es";

    setTimeout(() => {
      typeText(phrase, textEl, 75, () => {
        setTimeout(() => {
          if (showTranslation) {
            translationEl.textContent = "\u201c" + translated + "\u201d";
            translationEl.classList.add("show");
          }
          setTimeout(() => {
            dividerEl.classList.add("show");
            setTimeout(() => {
              handleEl.classList.add("show");
            }, 300);
          }, showTranslation ? 400 : 0);
        }, 400);
      });
    }, 500);
  }

  // Script sits at the end of <body>, so the DOM is already parsed by the
  // time this runs — start immediately rather than waiting on an event
  // that may have already fired.
  start();
</script>

</body>
</html>
